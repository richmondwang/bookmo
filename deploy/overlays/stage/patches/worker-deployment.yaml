# Stage patch: Cloud SQL Auth Proxy sidecar for the worker.
# Same placeholders as api-deployment.yaml patch.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kadto-worker
spec:
  template:
    metadata:
      annotations:
        iam.gke.io/gcp-service-account: "<gcp-sa-email>"
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          args:
            - "--structured-logs"
            - "--port=5432"
            - "<gcp-project-id>:<region>:<instance-name>"
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
