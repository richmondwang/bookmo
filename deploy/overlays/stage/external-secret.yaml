# Pulls secrets from GCP Secret Manager and materialises them as
# a Kubernetes Secret named "kadto-secrets" in the kadto-stage namespace.
#
# Secret naming convention in GCP Secret Manager:
#   kadto-stage-<key>  e.g. kadto-stage-jwt-secret
#
# Create each secret once:
#   gcloud secrets create kadto-stage-jwt-secret --data-file=- <<< "your-jwt-secret"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kadto-secrets
  namespace: kadto-stage
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: kadto-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # Cloud SQL Auth Proxy listens on 127.0.0.1:5432 inside the pod.
    # Store the full DSN in Secret Manager, e.g.:
    #   postgres://kadto:<password>@127.0.0.1:5432/booking_platform?sslmode=disable
    - secretKey: DATABASE_URL
      remoteRef:
        key: kadto-stage-database-url

    # GCP Memorystore private IP — set during Memorystore provisioning
    - secretKey: REDIS_URL
      remoteRef:
        key: kadto-stage-redis-url

    - secretKey: JWT_SECRET
      remoteRef:
        key: kadto-stage-jwt-secret

    - secretKey: PAYMONGO_SECRET_KEY
      remoteRef:
        key: kadto-stage-paymongo-secret-key

    - secretKey: PAYMONGO_WEBHOOK_SECRET
      remoteRef:
        key: kadto-stage-paymongo-webhook-secret

    - secretKey: FCM_SERVER_KEY
      remoteRef:
        key: kadto-stage-fcm-server-key

    - secretKey: APNS_KEY_ID
      remoteRef:
        key: kadto-stage-apns-key-id

    - secretKey: APNS_TEAM_ID
      remoteRef:
        key: kadto-stage-apns-team-id

    - secretKey: APNS_BUNDLE_ID
      remoteRef:
        key: kadto-stage-apns-bundle-id

    - secretKey: S3_BUCKET
      remoteRef:
        key: kadto-stage-s3-bucket

    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: kadto-stage-s3-access-key

    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: kadto-stage-s3-secret-key

    - secretKey: S3_ENDPOINT
      remoteRef:
        key: kadto-stage-s3-endpoint
