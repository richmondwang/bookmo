apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kadto-local

resources:
  - ../../base
  - postgres.yaml
  - redis.yaml
  - secret.yaml

patches:
  # Override base ConfigMap with local env values (strategic merge — data is merged)
  - path: configmap.yaml
    target:
      kind: ConfigMap
      name: kadto-config
  - path: patches/api-deployment.yaml
    target:
      kind: Deployment
      name: kadto-api
  - path: patches/worker-deployment.yaml
    target:
      kind: Deployment
      name: kadto-worker

# Skaffold replaces these image tags at dev/run time
images:
  - name: ghcr.io/richmondwang/kadto-api
    newTag: local
  - name: ghcr.io/richmondwang/kadto-worker
    newTag: local
