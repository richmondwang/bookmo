# Pulls prod secrets from GCP Secret Manager.
# Secret naming convention: kadto-prod-<key>
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: kadto-secrets
  namespace: kadto-prod
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: gcp-secret-manager
    kind: SecretStore
  target:
    name: kadto-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: kadto-prod-database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: kadto-prod-redis-url
    - secretKey: JWT_SECRET
      remoteRef:
        key: kadto-prod-jwt-secret
    - secretKey: PAYMONGO_SECRET_KEY
      remoteRef:
        key: kadto-prod-paymongo-secret-key
    - secretKey: PAYMONGO_WEBHOOK_SECRET
      remoteRef:
        key: kadto-prod-paymongo-webhook-secret
    - secretKey: FCM_SERVER_KEY
      remoteRef:
        key: kadto-prod-fcm-server-key
    - secretKey: APNS_KEY_ID
      remoteRef:
        key: kadto-prod-apns-key-id
    - secretKey: APNS_TEAM_ID
      remoteRef:
        key: kadto-prod-apns-team-id
    - secretKey: APNS_BUNDLE_ID
      remoteRef:
        key: kadto-prod-apns-bundle-id
    - secretKey: S3_BUCKET
      remoteRef:
        key: kadto-prod-s3-bucket
    - secretKey: S3_ACCESS_KEY
      remoteRef:
        key: kadto-prod-s3-access-key
    - secretKey: S3_SECRET_KEY
      remoteRef:
        key: kadto-prod-s3-secret-key
    - secretKey: S3_ENDPOINT
      remoteRef:
        key: kadto-prod-s3-endpoint
