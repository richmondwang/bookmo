# External Secrets Operator — SecretStore backed by GCP Secret Manager.
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Grant the GKE node pool (or Workload Identity SA) roles/secretmanager.secretAccessor
#      on the GCP project.
#   3. Replace <gcp-project-id> below.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secret-manager
  namespace: kadto-stage
spec:
  provider:
    gcpsm:
      # Replace with your GCP project ID
      projectID: "<gcp-project-id>"
      auth:
        workloadIdentity:
          # The GCP service account used by the ESO controller.
          # Must have roles/secretmanager.secretAccessor.
          # Format: <sa-name>@<project>.iam.gserviceaccount.com
          serviceAccountRef:
            name: kadto
            namespace: kadto-stage
