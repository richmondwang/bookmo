apiVersion: apps/v1
kind: Deployment
metadata:
  name: kadto-worker
  labels:
    app.kubernetes.io/name: kadto-worker
    app.kubernetes.io/component: worker
    app.kubernetes.io/part-of: kadto
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kadto-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kadto-worker
        app.kubernetes.io/component: worker
        app.kubernetes.io/part-of: kadto
    spec:
      serviceAccountName: kadto
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/richmondwang/kadto-worker:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: kadto-config
            - secretRef:
                name: kadto-secrets
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      # imagePullSecrets:
      #   - name: ghcr-pull-secret
